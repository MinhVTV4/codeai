<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translator - EN to VI</title>
</head>
<body>
    <div id="root"></div>
    
    <!-- Giữ nguyên cấu hình AI từ Gemini Developer API và cách kết nối -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-app.js";
        import { getAI, getGenerativeModel, GoogleAIBackend } from "https://www.gstatic.com/firebasejs/12.1.0/firebase-ai.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDYLYuXkEl2mYZEGeKa73O43RLPy8pgz0M",
            authDomain: "chandoan-7216d.firebaseapp.com",
            projectId: "chandoan-7216d",
            storageBucket: "chandoan-7216d.firebasestorage.app",
            messagingSenderId: "609312923908",
            appId: "1:609312923908:web:d456190e872dba66a23051"
        };

        try {
            const app = initializeApp(firebaseConfig);
            const ai = getAI(app, { backend: new GoogleAIBackend() });
            // Khởi tạo model và lưu vào window để React App có thể sử dụng lại cho nhiều chức năng
            window.geminiModel = getGenerativeModel(ai, { model: "gemini-2.5-flash" });
            
            // Phát sự kiện thông báo AI đã sẵn sàng
            window.dispatchEvent(new Event('gemini-ready'));
            console.log("Firebase AI initialized successfully.");
        } catch (error) {
            console.error("Firebase AI Init Error:", error);
            window.geminiInitError = error;
            window.dispatchEvent(new Event('gemini-error'));
        }
    </script>
    
    <!-- Load React App -->
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
