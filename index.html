<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Translator</title>
</head>
<body>
    <div id="root"></div>
    <!-- Firebase AI Logic -->
    <script type="module">
      import { initializeApp } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-app.js";
      import { getVertexAI, getGenerativeModel } from "https://www.gstatic.com/firebasejs/10.10.0/firebase-vertexai-preview.js";

      // Vui lòng dán lại cấu hình Firebase của bạn vào đây
      const firebaseConfig = {
        apiKey: "YOUR_API_KEY",
        authDomain: "YOUR_AUTH_DOMAIN",
        projectId: "YOUR_PROJECT_ID",
        storageBucket: "YOUR_STORAGE_BUCKET",
        messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
        appId: "YOUR_APP_ID"
      };

      const app = initializeApp(firebaseConfig);
      const vertexAI = getVertexAI(app);
      window.generativeModel = getGenerativeModel(vertexAI, { model: "gemini-1.5-flash" });
    </script>
    <!-- Load React App -->
    <script type="module" src="/src/main.tsx"></script>
</body>
</html>
